server:
  http_listen_port: 9080
  grpc_listen_port: 9081

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: pcbbuilder
    static_configs:
      - targets:
          - localhost
        labels:
          app: xgenpcb
          environment: production
    scrape_configs:
      - job_name: system-logs
        paths:
          - /var/log/pcbbuilder/*.log
        labels:
          job: pcbbuilder