# ============================================
# XgenPCB - Production Docker Compose
# ============================================

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xgenpcb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pcbbuilder}
      POSTGRES_USER: ${POSTGRES_USER:-pcbbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pcbbuilder_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcbbuilder} -d ${POSTGRES_DB:-pcbbuilder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xgenpcb-network

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xgenpcb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xgenpcb-network

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: xgenpcb-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_PORT=8000
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pcbbuilder}:${POSTGRES_PASSWORD:-pcbbuilder_dev}@postgres:5432/${POSTGRES_DB:-pcbbuilder}
      - REDIS_URL=redis://redis:6379/0
      - LOCAL_STORAGE_PATH=/app/storage/designs
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-nvidia/llama-3.1-nemotron-70b-instruct}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRATION_HOURS=24
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:8080,http://localhost:5173
    volumes:
      - ./storage:/app/storage
      - ./backend/data:/app/data
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xgenpcb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker (AI) ──────────────────────────────────────
  celery-worker-ai:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: xgenpcb-celery-ai
    restart: unless-stopped
    command: celery -A shared.celery_app worker -Q ai -l info -n ai@%h --concurrency=2
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pcbbuilder}:${POSTGRES_PASSWORD:-pcbbuilder_dev}@postgres:5432/${POSTGRES_DB:-pcbbuilder}
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-nvidia/llama-3.1-nemotron-70b-instruct}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOCAL_STORAGE_PATH=/app/storage/designs
    volumes:
      - ./storage:/app/storage
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - xgenpcb-network

  # ── Celery Worker (EDA) ─────────────────────────────────────
  celery-worker-eda:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: xgenpcb-celery-eda
    restart: unless-stopped
    command: celery -A shared.celery_app worker -Q eda -l info -n eda@%h --concurrency=2
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pcbbuilder}:${POSTGRES_PASSWORD:-pcbbuilder_dev}@postgres:5432/${POSTGRES_DB:-pcbbuilder}
      - REDIS_URL=redis://redis:6379/0
      - LOCAL_STORAGE_PATH=/app/storage/designs
    volumes:
      - ./storage:/app/storage
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - xgenpcb-network

  # ── Celery Beat (Scheduler) ─────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: xgenpcb-celery-beat
    restart: unless-stopped
    command: celery -A shared.celery_app beat -l info
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pcbbuilder}:${POSTGRES_PASSWORD:-pcbbuilder_dev}@postgres:5432/${POSTGRES_DB:-pcbbuilder}
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    volumes:
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - xgenpcb-network

  # ── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    container_name: xgenpcb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - xgenpcb-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: xgenpcb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - xgenpcb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus Monitoring ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: xgenpcb-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - xgenpcb-network

  # ── Grafana Dashboards ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: xgenpcb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - xgenpcb-network

  # ── MinIO Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: xgenpcb-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - xgenpcb-network

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  xgenpcb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
